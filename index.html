<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidney | Portfólio</title>

  <meta name="description" content="Portfólio de Sidney, desenvolvedor focado em Web, Back-End e fundamentos sólidos de programação. Projetos, stack e contato.">
  <meta property="og:title" content="Sidney — Desenvolvedor" />
  <meta property="og:description" content="Portfólio com projetos, stack e contato. Base sólida em desenvolvimento web." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://seusite.com" />
  <meta property="og:image" content="https://seusite.com/preview.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
   <!-- adicionado o i18n para tradução dos itens -->
  <header class="navbar">
    <div class="container">
      <h1 class="logo">DneyDev</h1>
      <div class="lang-switch">
        <button onclick="loadLanguage('pt')">PT</button>
        <button onclick="loadLanguage('en')">EN</button>
      </div>

      <nav>
        <ul class="nav-links">
          <li><a data-i18n="nav.about" href="#sobre">Sobre</a></li>
          <li><a data-i18n="nav.stack" href="#stack">Stack</a></li>
          <li><a data-i18n="nav.projects" href="#projetos">Projetos</a></li>
          <li><a data-i18n="nav.contact" href="#contato">Contato</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO -->
   <!-- adicionado o i18n para tradução dos itens -->
  <section class="hero reveal">
    <div class="container">
      <h2 data-i18n="hero.title">
      </h2>

      <p data-i18n="hero.subtitle">
      </p>

      <div class="hero-buttons">
        <a href="#projetos" class="btn primary" data-i18n="hero.btn">Ver Projetos</a>
      </div>
    </div>
  </section>

  <!-- Seção Sobre -->
  <section id="sobre" class="section reveal">
    <div class="container">
      <h3 data-i18n="about.title"></h3> 
      <p data-i18n="about.description">
      </p>
    </div>
  </section>

  <!-- Seção de Stacks -->
  <section id="stack" class="section reveal">
    <div class="container">
      <h3 data-i18n="stack.title"></h3>

      <div id="stack-container" class="stack-grid"></div>
    </div>
  </section>


  <!-- Seção de Projetos -->
  <section id="projects" class="section reveal">
    <div class="container">
      <h3 data-i18n="projects.title"></h3>

      <div id="projects-container" class="projects-grid"></div>
    </div>
  </section>


  <!-- CONTATO -->
   <!-- adicionado o i18n para tradução dos itens -->
  <section id="contato" class="section reveal contact-section">
  <div class="container">
    <div class="contact-wrapper">

      <span data-i18n="contact.label" class="section-label">Contato</span>

      <h2 data-i18n="contact.title">Vamos conversar?</h2>

      <p data-i18n="contact.text" class="contact-text">
        Estou sempre aberto a discutir novos projetos, oportunidades
        ou simplesmente trocar ideias sobre tecnologia.
      </p>
<!-- 
      <a href="mailto:sidney.pe010@gmail.com" class="btn-primary">
        Enviar mensagem
      </a> -->

      <!-- adicionado o i18n para tradução dos itens -->
      <div class="contact-cards">
        <a href="mailto:sidney.pe010@gmail.com" class="contact-card">
          <span data-i18n="contact.email">Email</span>
          <strong>sidney.pe010@gmail.com</strong>
        </a>

        <a href="https://github.com/DneyDev" target="_blank" class="contact-card">
          <span span data-i18n="contact.github">GitHub</span>
          <strong>github.com/DneyDev</strong>
        </a>

        <a href="https://www.linkedin.com/in/sidneyrodrigues010" target="_blank" class="contact-card">
          <span span data-i18n="contact.linkedin">LinkedIn</span>
          <strong>Perfil Profissional</strong>
        </a>
      </div>

    </div>
  </div>
</section>

  <script src="js/projects.js"></script>
  <script src="js/stacks.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js" defer></script>
</body>
</html>
